name: Build and Test React Application

on:
  push:
    branches: [main]

jobs:
  build_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: cd app && pnpm install --frozen-lockfile

      - name: Install Cypress binary
        run: cd app && pnpm exec cypress install

      - name: Generate JSDoc
        run: cd app && pnpm run doc

      - name: Build React App
        run: cd app && pnpm run build

      - name: Run Tests
        run: cd app && pnpm test

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: app
          start: pnpm dev
          wait-on: 'http://localhost:5173/Test_cycle_TDD/'

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: app/coverage/lcov.info
          fail_ci_if_error: 'true'

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./app/dist

  publish-npm:
    needs: build_test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org/

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: cd app && pnpm install --frozen-lockfile

      - name: Check version against NPM registry
        id: version-check
        run: |
          cd app
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "Local version: $LOCAL_VERSION"
          echo "Package name: $PACKAGE_NAME"

          # Get the published version from NPM (returns empty if not published yet)
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "")
          echo "Published version: $PUBLISHED_VERSION"

          if [ -z "$PUBLISHED_VERSION" ]; then
            echo "Package not yet published on NPM. Will publish."
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            # Compare versions manually
            IS_GREATER=$(node -e "
              const local = '$LOCAL_VERSION';
              const published = '$PUBLISHED_VERSION';
              const [lMajor, lMinor, lPatch] = local.split('.').map(Number);
              const [pMajor, pMinor, pPatch] = published.split('.').map(Number);
              const isGreater = lMajor > pMajor ||
                (lMajor === pMajor && lMinor > pMinor) ||
                (lMajor === pMajor && lMinor === pMinor && lPatch > pPatch);
              console.log(isGreater ? 'true' : 'false');
            ")
            echo "Is local version greater? $IS_GREATER"
            echo "should_publish=$IS_GREATER" >> $GITHUB_OUTPUT
          fi

      - name: Build NPM package
        if: steps.version-check.outputs.should_publish == 'true'
        run: cd app && pnpm run build-npm

      - name: Publish to NPM
        if: steps.version-check.outputs.should_publish == 'true'
        run: cd app && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish (version unchanged)
        if: steps.version-check.outputs.should_publish != 'true'
        run: echo "Skipping publish - local version is not greater than published version."

  integration-test:
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_DATABASE=testdb" >> .env
          echo "MYSQL_USER=root" >> .env

      - name: Build and start containers
        run: docker compose -f docker-compose.yml up --build -d

      - name: Wait for containers to be healthy
        run: |
          echo "Waiting for all services to be healthy..."
          for i in $(seq 1 60); do
            DB_HEALTH=$(docker inspect --format='{{.State.Health.Status}}' tp-cicd-sander-db-1 2>/dev/null || echo "not found")
            echo "Attempt $i/60 - db: $DB_HEALTH"
            if [ "$DB_HEALTH" = "healthy" ]; then
              echo "All services are healthy!"
              break
            fi
            if [ "$i" = "60" ]; then
              echo "Timeout waiting for services"
              docker compose logs
              exit 1
            fi
            sleep 5
          done

      - name: Verify all containers are running
        run: |
          docker compose ps
          RUNNING=$(docker compose ps --status running -q | wc -l)
          echo "Running containers: $RUNNING"
          if [ "$RUNNING" -lt 3 ]; then
            echo "Not all containers are running!"
            docker compose logs
            exit 1
          fi

      - name: Test API endpoint /users
        run: |
          sleep 5
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/users)
          echo "HTTP status code: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "API returned non-200 status code"
            docker compose logs api
            exit 1
          fi

          BODY=$(curl -s http://localhost:8000/users)
          echo "Response body: $BODY"
          EMPTY_CHECK=$(echo "$BODY" | python3 -c "import sys,json; data=json.load(sys.stdin); print('empty' if len(data.get('utilisateurs',[])) == 0 else 'ok')")
          if [ "$EMPTY_CHECK" = "empty" ]; then
            echo "User list is empty!"
            exit 1
          fi
          echo "Integration test passed!"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push API image to Docker Hub
        run: |
          API_IMAGE=$(docker compose images api --format json | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['Repository'])")
          docker tag "$API_IMAGE" ${{ secrets.DOCKERHUB_USERNAME }}/tp-cicd-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/tp-cicd-api:latest

      - name: Cleanup
        if: always()
        run: docker compose down -v

  deploy:
    needs: integration-test
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    steps:
      - name: Deploy to Github pages
        id: deployment
        uses: actions/deploy-pages@v4
